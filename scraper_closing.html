<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiseGold Closing Prices</title>
  <style>
    body { font-family: Georgia, serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f9f7f2; color: #222; }
    h1 { font-size: 1.8rem; border-bottom: 2px solid #b8972e; padding-bottom: 10px; color: #b8972e; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #fff; border-radius: 4px; overflow: hidden; }
    th { background: #b8972e; color: #fff; padding: 12px 16px; text-align: left; font-size: 0.9rem; }
    td { padding: 10px 16px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
    tr:last-child td { border-bottom: none; }
    .up { color: #2e7d32; font-weight: bold; }
    .down { color: #c62828; font-weight: bold; }
    h2 { font-size: 1rem; color: #888; font-weight: normal; margin: 30px 0 8px 0; }
  </style>
</head>
<body>
  <h1>WiseGold Closing Prices</h1>
  <div id="content"></div>

  <script>
    fetch('https://raw.githubusercontent.com/development11tr/wisegold-scraper/main/WiseGoldMetalPrices.json')
      .then(r => r.json())
      .then(history => {
        const container = document.getElementById('content');
        history.forEach(entry => {
          const date = new Date(entry.date).toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
          });
          const metals = ['GOLD', 'SILVER', 'PLATINUM', 'PALLADIUM'];
          let rows = '';
          metals.forEach(m => {
            const change = parseFloat(entry[m].change);
            const cls = change >= 0 ? 'up' : 'down';
            const sign = change >= 0 ? '+' : '';
            rows += `
              <tr>
                <td>${m}</td>
                <td>$${entry[m].closing}</td>
                <td>${entry[m].closing_timestamp}</td>
                <td class="${cls}">${sign}${entry[m].change}</td>
                <td class="${cls}">${sign}${entry[m].change_percent}%</td>
              </tr>`;
          });
          container.innerHTML += `
            <h2>${date}</h2>
            <table>
              <thead>
                <tr>
                  <th>Metal</th>
                  <th>Closing Price</th>
                  <th>Closing Time</th>
                  <th>Change</th>
                  <th>Change %</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>`;
        });
      });
  </script>
</body>
</html>
