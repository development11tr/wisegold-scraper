<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiseGold Weekly Pulse</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9f7f2;
      color: #222;
    }
    h1 {
      font-size: 1.8rem;
      border-bottom: 2px solid #b8972e;
      padding-bottom: 10px;
      color: #b8972e;
    }
    .post {
      background: #fff;
      border-left: 4px solid #b8972e;
      margin: 30px 0;
      padding: 20px 24px;
      border-radius: 4px;
    }
    h2 { font-size: 1.2rem; margin: 0 0 8px 0; color: #1a1a1a; }
    h3 { font-size: 0.85rem; font-weight: normal; color: #888; margin: 0 0 14px 0; }
    p { font-size: 0.97rem; line-height: 1.7; white-space: pre-line; color: #333; }
    a.ver-mas { display: inline-block; margin-top: 12px; font-size: 0.85rem; color: #b8972e; text-decoration: none; }
    a.ver-mas:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>WiseGold Weekly Pulse</h1>
  <div id="posts"></div>
  <script>
    fetch('https://raw.githubusercontent.com/development11tr/wisegold-scraper/main/WiseGoldLinkedInPosts.json')
      .then(r => r.json())
      .then(posts => {
        const container = document.getElementById('posts');
        posts.forEach(post => {
          const date = new Date(post.date).toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
          });
          container.innerHTML += `
            <div class="post">
              <h2>${post.title}</h2>
              <h3>${date}</h3>
              <p>${post.text}</p>
              <a class="ver-mas" href="${post.url}" target="_blank">View on LinkedIn →</a>
            </div>
          `;
        });
      });
  </script>
</body>
</html>
